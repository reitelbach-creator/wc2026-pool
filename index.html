<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>World Cup 2026 — Prediction Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --panel:#141417;
    --panel-2:#1c1c20;
    --line:#2a2a30;
    --txt:#f3f3f0;
    --txt-dim:#9a9aa2;
    --gold:#e7b53c;
    --gold-deep:#b8860b;
    /* WC26 palette */
    --c1:#e5342b; --c2:#8a6fe8; --c3:#ff6a1a; --c4:#b6e61e;
    --c5:#2c6fe0; --c6:#1fc7b6; --c7:#f5d90a; --c8:#e84393; --c9:#1b7a5a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:'Inter',system-ui,sans-serif;min-height:100%}
  body{overflow-x:hidden}

  /* ---- WC26 corner motifs ---- */
  .corner{position:fixed;width:42vmax;height:42vmax;pointer-events:none;z-index:0;opacity:.5;
    background:repeating-radial-gradient(circle at var(--cx) var(--cy),
      var(--cc) 0 11px, transparent 11px 34px);
    -webkit-mask-image:radial-gradient(circle at var(--cx) var(--cy),#000 0,#000 12%,transparent 72%);
    mask-image:radial-gradient(circle at var(--cx) var(--cy),#000 0,#000 12%,transparent 72%)}
  .corner.tl{top:0;left:0;--cx:0;--cy:0;--cc:var(--c1)}
  .corner.tr{top:0;right:0;--cx:100%;--cy:0;--cc:var(--c5)}
  .corner.bl{bottom:0;left:0;--cx:0;--cy:100%;--cc:var(--c6)}
  .corner.br{bottom:0;right:0;--cx:100%;--cy:100%;--cc:var(--c2)}

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 16px 96px}

  /* ---- Header ---- */
  header{display:flex;align-items:center;gap:14px;padding:18px 4px 14px;
    border-bottom:1px solid var(--line);position:sticky;top:0;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(10,10,11,.85));backdrop-filter:blur(8px);z-index:10}
  .logo{width:46px;height:46px;flex:none;border-radius:10px;object-fit:contain;
    background:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Anton';font-size:22px;color:#111;letter-spacing:-1px}
  .brand h1{font-family:'Anton';font-weight:400;font-size:21px;letter-spacing:.5px;margin:0;line-height:1}
  .brand p{margin:2px 0 0;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:700}
  header .spacer{flex:1}
  .me{display:flex;align-items:center;gap:9px}
  .me img{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gold)}
  .me span{font-size:13px;color:var(--txt-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--txt-dim);
    padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
  .ghost:hover{border-color:var(--gold);color:var(--gold)}

  /* ---- Tabs ---- */
  nav.tabs{display:flex;gap:6px;margin:16px 0 4px;flex-wrap:wrap}
  .tab{font-family:'Anton';font-weight:400;letter-spacing:.6px;font-size:14px;
    padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel);
    color:var(--txt-dim);cursor:pointer;text-transform:uppercase}
  .tab.active{background:var(--gold);color:#15140e;border-color:var(--gold)}

  /* ---- Round chips ---- */
  .rounds{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px;-webkit-overflow-scrolling:touch}
  .rounds::-webkit-scrollbar{display:none}
  .rchip{flex:none;padding:8px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt-dim);font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:7px;white-space:nowrap}
  .rchip.active{border-color:var(--gold);color:var(--txt);background:var(--panel-2)}
  .dot{width:7px;height:7px;border-radius:50%;background:#555}
  .dot.open{background:var(--c4)}
  .dot.locked{background:var(--c1)}

  .statusbar{display:flex;align-items:center;gap:10px;margin:6px 0 14px;font-size:13px;color:var(--txt-dim);flex-wrap:wrap}
  .pill{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:4px 9px;border-radius:6px}
  .pill.open{background:rgba(182,230,30,.15);color:var(--c4)}
  .pill.locked{background:rgba(229,52,43,.15);color:#ff7a72}
  .pill.upcoming{background:rgba(154,154,162,.13);color:var(--txt-dim)}

  /* ---- Match cards ---- */
  .matches{display:grid;gap:11px;grid-template-columns:1fr}
  @media(min-width:720px){.matches{grid-template-columns:1fr 1fr}}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .match .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .team{display:flex;align-items:center;gap:8px;min-width:0}
  .team.away{flex-direction:row-reverse;text-align:right}
  .flag{font-size:22px;flex:none;line-height:1}
  .tname{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tname.tbd{color:var(--txt-dim);font-style:italic;font-weight:500}
  .sc{width:46px;height:46px;text-align:center;font-family:'Anton';font-size:22px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;color:var(--txt)}
  .sc:focus{outline:none;border-color:var(--gold)}
  .sc:disabled{opacity:.85}
  .vs{font-size:12px;color:var(--txt-dim);font-weight:700}
  .scores{display:flex;align-items:center;gap:9px;justify-content:center}

  .penbox{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px;display:none}
  .penbox.show{display:block}
  .penbox .lbl{font-size:11px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:700}
  .penopts{display:flex;gap:8px}
  .pen{flex:1;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--txt-dim);font-weight:700;font-size:13px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pen.sel{border-color:var(--gold);color:var(--gold);background:rgba(231,181,60,.1)}
  .pen:disabled{cursor:default}

  .result{margin-top:11px;border-top:1px solid var(--line);padding-top:10px;
    display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:6px}
  .result .actual{color:var(--txt-dim)}
  .result .actual b{color:var(--txt)}
  .pts{font-family:'Anton';font-size:18px;padding:3px 12px;border-radius:8px}
  .pts.p30{background:var(--gold);color:#15140e}
  .pts.p20{background:rgba(231,181,60,.2);color:var(--gold)}
  .pts.p10{background:rgba(231,181,60,.12);color:var(--gold)}
  .pts.p0{background:var(--panel-2);color:var(--txt-dim)}

  .savebar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(10,10,11,0),var(--bg) 38%);display:none}
  .savebar.show{display:block}
  .savebar .inner{max-width:1100px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .btn{flex:1;font-family:'Anton';font-size:16px;letter-spacing:.5px;padding:14px;border-radius:12px;border:none;
    background:var(--gold);color:#15140e;cursor:pointer;text-transform:uppercase}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:var(--panel-2);color:var(--txt);border:1px solid var(--line);flex:none;padding:14px 18px}
  .saved-note{font-size:12px;color:var(--c4);font-weight:700}

  /* ---- Leaderboard ---- */
  .lb{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .lbrow{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px}
  .rank{font-family:'Anton';font-size:20px;width:34px;text-align:center;color:var(--txt-dim);flex:none}
  .lbrow.r1{border-color:var(--gold)} .lbrow.r1 .rank{color:var(--gold)}
  .lbrow.r2 .rank{color:#cfcfd4} .lbrow.r3 .rank{color:#cd7f32}
  .lbrow .av{width:34px;height:34px;border-radius:50%;flex:none;background:var(--panel-2)}
  .lbrow .nm{flex:1;font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbrow .meta{font-size:11px;color:var(--txt-dim);font-weight:600;margin-top:1px}
  .lbrow .tot{font-family:'Anton';font-size:22px;color:var(--gold)}
  .lbrow .tot small{font-size:11px;color:var(--txt-dim);font-family:'Inter';margin-left:3px}

  /* ---- Admin ---- */
  .adminround{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
  .adminround h3{font-family:'Anton';font-weight:400;margin:0 0 4px;font-size:18px;letter-spacing:.5px}
  .adminhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--txt-dim);cursor:pointer;
    border:1px solid var(--line);padding:6px 11px;border-radius:8px;background:var(--panel-2)}
  .toggle.on{color:var(--c4);border-color:var(--c4)}
  .toggle.lock.on{color:#ff7a72;border-color:#ff7a72}
  .amatch{display:grid;grid-template-columns:1fr 70px 70px 1fr;gap:8px;align-items:center;margin-bottom:9px}
  .amatch input[type=text]{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--txt);padding:9px;font-size:13px;font-weight:600;min-width:0}
  .amatch input[type=number]{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--txt);padding:9px;font-size:14px;text-align:center;font-family:'Anton'}
  .amatch input:focus{outline:none;border-color:var(--gold)}
  .afoot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px;font-size:12px;color:var(--txt-dim)}
  .afoot label{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600}
  .afoot select{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--txt);padding:5px 8px;font-size:12px}
  .save-r{font-family:'Anton';font-size:13px;letter-spacing:.5px;padding:9px 16px;border-radius:9px;border:none;
    background:var(--gold);color:#15140e;cursor:pointer;text-transform:uppercase}

  /* ---- Review panel ---- */
  .review-panel{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:var(--panel);
    border-left:1px solid var(--line);z-index:30;transition:.28s ease;overflow-y:auto;
    box-shadow:-4px 0 20px rgba(0,0,0,.4)}
  .review-panel.open{right:0}
  .review-panel-head{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--panel);z-index:31}
  .review-panel-head .match-title{flex:1;font-family:'Anton';font-weight:400;font-size:16px;letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .review-panel-head .close{background:transparent;border:none;color:var(--txt-dim);font-size:22px;cursor:pointer;padding:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .review-panel-head .close:hover{color:var(--txt)}
  .review-preds{padding:12px}
  .rpred{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;
    display:flex;align-items:center;gap:10px}
  .rpred .pname{flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rpred .ppick{font-size:13px;color:var(--txt-dim);min-width:60px;text-align:right;font-family:'Anton'}
  .rpred .ppts{font-family:'Anton';font-size:16px;color:var(--gold);padding:3px 10px;background:rgba(231,181,60,.15);border-radius:7px;flex:none}
  .rpred.nopick .pname{color:var(--txt-dim);font-weight:500;font-style:italic}
  .rpred.nopick .ppick{color:var(--txt-dim)}

  /* ---- misc ---- */
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px}
  .gsign{display:flex;align-items:center;gap:11px;background:#fff;color:#1f1f1f;border:none;
    padding:14px 22px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
  .gsign svg{width:20px;height:20px}
  .empty{text-align:center;color:var(--txt-dim);padding:50px 20px;font-size:14px}
  .hide{display:none!important}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:50;
    background:var(--panel-2);border:1px solid var(--gold);color:var(--txt);padding:11px 18px;border-radius:10px;
    font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .sechead{font-family:'Anton';font-weight:400;font-size:15px;color:var(--txt-dim);
    letter-spacing:1.5px;text-transform:uppercase;margin:22px 0 4px}
</style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <!-- LOGIN -->
  <div id="login" class="wrap center hide">
    <img class="logo" id="loginLogo" src="logo.webp" alt="" style="width:78px;height:78px;font-size:34px"
      onerror="this.onerror=null;this.removeAttribute('src');this.textContent='26'">
    <div>
      <h1 style="font-family:'Anton';font-weight:400;font-size:30px;letter-spacing:.5px;margin:0">WORLD CUP 2026</h1>
      <p style="color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:700;font-size:12px;margin:6px 0 0">Prediction Pool</p>
    </div>
    <button class="gsign" id="googleBtn">
      <svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45 24c0-1.6-.1-2.7-.4-3.9H24v7.4h12c-.2 1.9-1.5 4.8-4.4 6.8l6.7 5.2C42.5 36 45 30.6 45 24z"/><path fill="#34A853" d="M24 46c5.9 0 10.9-2 14.5-5.3l-6.7-5.2c-1.8 1.3-4.3 2.2-7.8 2.2-6 0-11-4-12.8-9.5l-7 5.4C7.8 40.7 15.3 46 24 46z"/><path fill="#FBBC05" d="M11.2 28.2c-.5-1.3-.7-2.7-.7-4.2s.3-2.9.7-4.2l-7-5.4C2.9 17.6 2 20.7 2 24s.9 6.4 2.2 9.6l7-5.4z"/><path fill="#EA4335" d="M24 9.5c3.4 0 5.7 1.5 7 2.7l5.9-5.7C33.2 3.1 28.6 1 24 1 15.3 1 7.8 6.3 4.2 14.4l7 5.4C13 13.5 18 9.5 24 9.5z"/></svg>
      Sign in with Google
    </button>
    <p style="color:var(--txt-dim);font-size:12px;max-width:320px">Your colleagues sign in once with their Google account. Their name appears on the leaderboard automatically.</p>
  </div>

  <!-- APP -->
  <div id="app" class="hide">
    <div class="wrap">
      <header>
        <img class="logo" id="hdrLogo" src="logo.webp" alt=""
          onerror="this.onerror=null;this.removeAttribute('src');this.textContent='26'">
        <div class="brand"><h1>WORLD CUP 2026</h1><p>Prediction Pool</p></div>
        <div class="spacer"></div>
        <div class="me"><img id="meAvatar" alt=""><span id="meName"></span>
          <button class="ghost" id="signOut">Sign out</button></div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-view="predict">Bracket</button>
        <button class="tab" data-view="leaderboard">Leaderboard</button>
        <button class="tab hide" data-view="admin" id="adminTab">Admin</button>
      </nav>

      <!-- PREDICT VIEW -->
      <section id="view-predict">
        <div class="rounds" id="roundChips"></div>
        <div class="statusbar" id="statusBar"></div>
        <div class="matches" id="matchList"></div>
      </section>

      <!-- LEADERBOARD VIEW -->
      <section id="view-leaderboard" class="hide">
        <div class="lb" id="lbList"></div>
      </section>

      <!-- ADMIN VIEW -->
      <section id="view-admin" class="hide">
        <div id="adminBody"></div>
        <div class="review-panel" id="reviewPanel">
          <div class="review-panel-head">
            <div class="match-title" id="reviewTitle"></div>
            <button class="close" id="reviewClose">×</button>
          </div>
          <div class="review-preds" id="reviewPreds"></div>
        </div>
      </section>
    </div>

    <div class="savebar" id="saveBar"><div class="inner">
      <span class="saved-note hide" id="savedNote">Saved</span>
      <button class="btn" id="savePicks">Save my predictions</button>
    </div></div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
  getRedirectResult, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ===== CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBojgW8oJie8n9FJ1aJ8tQlOGGXJqFv-_A",
  authDomain: "world-cup-2026-predictio-391f2.firebaseapp.com",
  databaseURL: "https://world-cup-2026-predictio-391f2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "world-cup-2026-predictio-391f2",
  storageBucket: "world-cup-2026-predictio-391f2.firebasestorage.app",
  messagingSenderId: "897758684787",
  appId: "1:897758684787:web:21da0b64b6b828f0292c06",
  measurementId: "G-GVRT6QBJF8"
};
const ADMIN_UID = "0pPuPxkS4pSHiv5b2uyoiJbQhKk1";

/* points */
const PTS_WINNER = 20;
const PTS_EXACT  = 10;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

/* ===== ROUND STRUCTURE ===== */
const ROUND_DEFS = [
  { id:'r32',   name:'Round of 32',    count:16 },
  { id:'r16',   name:'Round of 16',    count:8  },
  { id:'qf',    name:'Quarter-finals', count:4  },
  { id:'sf',    name:'Semi-finals',    count:2  },
  { id:'tp',    name:'Third place',    count:1  },
  { id:'final', name:'Final',          count:1  },
];
function defaultTournament(){
  return { rounds: ROUND_DEFS.map(r=>({
    id:r.id, name:r.name, open:false, locked:false,
    matches: Array.from({length:r.count},(_,i)=>({
      id:`${r.id}_${i+1}`, home:'', away:'',
      homeScore:null, awayScore:null, penaltyWinner:null, finished:false
    }))
  }))};
}

/* ===== FLAGS ===== */
const ISO = {argentina:'AR',france:'FR',brazil:'BR',england:'GB',spain:'ES',portugal:'PT',germany:'DE',
netherlands:'NL',belgium:'BE',croatia:'HR',italy:'IT',uruguay:'UY',colombia:'CO',mexico:'MX',
usa:'US','united states':'US',canada:'CA',morocco:'MA',japan:'JP','south korea':'KR',korea:'KR',
senegal:'SN',switzerland:'CH',denmark:'DK',poland:'PL',serbia:'RS',ghana:'GH',cameroon:'CM',
ecuador:'EC',australia:'AU',iran:'IR','saudi arabia':'SA',qatar:'QA',tunisia:'TN',nigeria:'NG',
egypt:'EG',algeria:'DZ','ivory coast':'CI',"cote d'ivoire":'CI','costa rica':'CR',peru:'PE',chile:'CL',
paraguay:'PY',sweden:'SE',norway:'NO',austria:'AT',ukraine:'UA',wales:'GB',scotland:'GB',turkey:'TR',
greece:'GR',czechia:'CZ','czech republic':'CZ',romania:'RO',hungary:'HU',jamaica:'JM',panama:'PA',
honduras:'HN','new zealand':'NZ',venezuela:'VE',bolivia:'BO','south africa':'ZA',mali:'ML',
'burkina faso':'BF','dr congo':'CD',uzbekistan:'UZ',iraq:'IQ',jordan:'JO',uae:'AE','united arab emirates':'AE',
'cape verde':'CV','el salvador':'SV',guatemala:'GT',curacao:'CW',haiti:'HT',bahrain:'BH',oman:'OM',
finland:'FI',ireland:'IE',iceland:'IS',slovakia:'SK',slovenia:'SI',albania:'AL'};
function flag(name){
  if(!name) return '⚽';
  const code = ISO[name.trim().toLowerCase()];
  if(!code) return '🏳️';
  return code.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0)));
}

/* ===== STATE ===== */
let me=null, isAdmin=false;
let tournament=null;
let allPreds={};       // uid -> {name,email,photoURL,picks}
let view='predict';
let currentRound='r16';
let draft={};          // matchId -> {home,away,penaltyWinner}
let dirty=false;

/* ===== HELPERS ===== */
const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

function winnerOf(hs,as,pen){
  if(hs==null||as==null||hs===''||as==='') return null;
  hs=+hs; as=+as;
  if(hs>as) return 'home';
  if(as>hs) return 'away';
  return pen||null;
}
function pointsFor(match,pick){
  if(!match.finished||!pick) return 0;
  let pts=0;
  const aw=winnerOf(match.homeScore,match.awayScore,match.penaltyWinner);
  const pw=winnerOf(pick.home,pick.away,pick.penaltyWinner);
  if(aw&&pw&&aw===pw) pts+=PTS_WINNER;
  if(pick.home!=null&&pick.away!=null&&pick.home!==''&&pick.away!==''
     && +pick.home===match.homeScore && +pick.away===match.awayScore) pts+=PTS_EXACT;
  return pts;
}
function getRound(id){return tournament?.rounds.find(r=>r.id===id);}

/* ===== AUTH ===== */
$('#googleBtn').onclick=async()=>{
  try{ await signInWithPopup(auth,provider); }
  catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'||e.code==='auth/cancelled-popup-request'){
      await signInWithRedirect(auth,provider);
    } else { toast('Sign-in failed: '+(e.code||e.message)); }
  }
};
getRedirectResult(auth).catch(()=>{});
$('#signOut').onclick=()=>signOut(auth);

onAuthStateChanged(auth,async user=>{
  if(!user){ me=null; $('#login').classList.remove('hide'); $('#app').classList.add('hide'); return; }
  me=user; isAdmin=(user.uid===ADMIN_UID);
  $('#login').classList.add('hide'); $('#app').classList.remove('hide');
  $('#meName').textContent=user.displayName||user.email;
  if(user.photoURL) $('#meAvatar').src=user.photoURL; else $('#meAvatar').style.display='none';
  if(isAdmin) $('#adminTab').classList.remove('hide');

  // record this user's name even before they predict (so leaderboard shows them)
  try{
    const ref=doc(db,'predictions',user.uid);
    const snap=await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref,{name:user.displayName||user.email,email:user.email,photoURL:user.photoURL||'',picks:{}});
    }
  }catch(e){}

  // admin: ensure tournament exists
  if(isAdmin){
    const tref=doc(db,'results','tournament');
    const ts=await getDoc(tref);
    if(!ts.exists()) await setDoc(tref,defaultTournament());
  }

  subscribe();
});

/* ===== LIVE DATA ===== */
function subscribe(){
  onSnapshot(doc(db,'results','tournament'),snap=>{
    tournament = snap.exists()? snap.data() : null;
    if(tournament && !getRound(currentRound)) currentRound=tournament.rounds[0].id;
    render();
  });
  onSnapshot(collection(db,'predictions'),snap=>{
    allPreds={};
    snap.forEach(d=>allPreds[d.id]=d.data());
    if(allPreds[me.uid]&&!dirty) draft=JSON.parse(JSON.stringify(allPreds[me.uid].picks||{}));
    render();
  });
}

/* ===== TABS ===== */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  view=t.dataset.view;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  $('#view-predict').classList.toggle('hide',view!=='predict');
  $('#view-leaderboard').classList.toggle('hide',view!=='leaderboard');
  $('#view-admin').classList.toggle('hide',view!=='admin');
  render();
});

/* ===== RENDER ===== */
function render(){
  if(view==='predict') renderPredict();
  if(view==='leaderboard') renderLeaderboard();
  if(view==='admin') renderAdmin();
}

function renderPredict(){
  const chips=$('#roundChips'); chips.innerHTML='';
  if(!tournament){ $('#statusBar').innerHTML=''; $('#matchList').innerHTML='<div class="empty">The tournament hasn\u2019t been set up yet. Hang tight \u2014 the admin is filling in the bracket.</div>'; $('#saveBar').classList.remove('show'); return; }

  tournament.rounds.forEach(r=>{
    const c=el('button','rchip'+(r.id===currentRound?' active':''));
    const status = r.finishedAll? '' : (r.open&&!r.locked?'open':(r.locked?'locked':''));
    c.innerHTML=`<span class="dot ${r.open&&!r.locked?'open':(r.locked?'locked':'')}"></span>${r.name}`;
    c.onclick=()=>{ if(dirty&&!confirm('You have unsaved predictions. Switch round anyway?'))return; currentRound=r.id; dirty=false; draft=JSON.parse(JSON.stringify(allPreds[me.uid]?.picks||{})); render(); };
    chips.appendChild(c);
  });

  const round=getRound(currentRound);
  const open = round.open && !round.locked;
  const sb=$('#statusBar');
  let pillCls = open?'open':(round.locked?'locked':'upcoming');
  let pillTxt = open?'Predictions open':(round.locked?'Predictions locked':'Not open yet');
  sb.innerHTML=`<span class="pill ${pillCls}">${pillTxt}</span>`+
    (open?'<span>Enter a score for every match, then save.</span>':
     round.locked?'<span>Predictions are closed. Results below.</span>':
     '<span>The admin will open this round when the matchups are set.</span>');

  const list=$('#matchList'); list.innerHTML='';
  const playable=round.matches.filter(m=>m.home&&m.away);
  if(playable.length===0){ list.innerHTML='<div class="empty">No matchups set for this round yet.</div>'; $('#saveBar').classList.remove('show'); return; }

  round.matches.forEach(m=>{
    if(!m.home||!m.away) return;
    const myPick = draft[m.id] || (allPreds[me.uid]?.picks?.[m.id]) || null;
    const card=el('div','match');
    const editable = open;
    const ph=myPick&&myPick.home!=null?myPick.home:'';
    const pa=myPick&&myPick.away!=null?myPick.away:'';

    card.innerHTML=`
      <div class="row">
        <div class="team home"><span class="flag">${flag(m.home)}</span><span class="tname">${m.home}</span></div>
        <div class="scores">
          <input class="sc" type="number" min="0" inputmode="numeric" data-m="${m.id}" data-s="home" value="${ph}" ${editable?'':'disabled'}>
          <span class="vs">VS</span>
          <input class="sc" type="number" min="0" inputmode="numeric" data-m="${m.id}" data-s="away" value="${pa}" ${editable?'':'disabled'}>
        </div>
        <div class="team away"><span class="flag">${flag(m.away)}</span><span class="tname">${m.away}</span></div>
      </div>
      <div class="penbox" data-pen="${m.id}">
        <div class="lbl">Tie \u2014 who advances on penalties?</div>
        <div class="penopts">
          <button class="pen" data-m="${m.id}" data-w="home" ${editable?'':'disabled'}>${flag(m.home)} ${m.home}</button>
          <button class="pen" data-m="${m.id}" data-w="away" ${editable?'':'disabled'}>${flag(m.away)} ${m.away}</button>
        </div>
      </div>`;

    if(m.finished){
      const pts=pointsFor(m,myPick);
      const aw=winnerOf(m.homeScore,m.awayScore,m.penaltyWinner);
      const penTxt = (m.homeScore===m.awayScore&&m.penaltyWinner)? ` (pens: ${m.penaltyWinner==='home'?m.home:m.away})`:'';
      const yourTxt = myPick&&myPick.home!=null? `${myPick.home}\u2013${myPick.away}${myPick.home===myPick.away&&myPick.penaltyWinner?` (${myPick.penaltyWinner==='home'?m.home:m.away})`:''}` : 'no pick';
      const res=el('div','result');
      res.innerHTML=`<span class="actual">Result <b>${m.homeScore}\u2013${m.awayScore}</b>${penTxt} \u00b7 you: ${yourTxt}</span>
        <span class="pts p${pts}">${pts} pts</span>`;
      card.appendChild(res);
    }
    list.appendChild(card);

    // wire penalty visibility
    updatePen(card,m.id);
  });

  // listeners
  list.querySelectorAll('input.sc').forEach(inp=>{
    inp.oninput=()=>{
      const id=inp.dataset.m, side=inp.dataset.s;
      draft[id]=draft[id]||{home:null,away:null,penaltyWinner:null};
      draft[id][side]= inp.value===''?null:Math.max(0,parseInt(inp.value)||0);
      dirty=true; $('#savedNote').classList.add('hide');
      const card=inp.closest('.match'); updatePen(card,id);
    };
  });
  list.querySelectorAll('button.pen').forEach(b=>{
    b.onclick=()=>{
      const id=b.dataset.m;
      draft[id]=draft[id]||{home:null,away:null,penaltyWinner:null};
      draft[id].penaltyWinner=b.dataset.w; dirty=true; $('#savedNote').classList.add('hide');
      const card=b.closest('.match'); updatePen(card,id);
    };
  });

  $('#saveBar').classList.toggle('show', open);
}

function updatePen(card,id){
  const p=draft[id]||{};
  const box=card.querySelector(`[data-pen="${id}"]`);
  const isDraw = p.home!=null&&p.away!=null&&p.home!==''&&p.away!==''&&+p.home===+p.away;
  box.classList.toggle('show',isDraw);
  card.querySelectorAll('button.pen').forEach(b=>b.classList.toggle('sel', isDraw&&p.penaltyWinner===b.dataset.w));
}

$('#savePicks').onclick=async()=>{
  const round=getRound(currentRound);
  // validate draws have a penalty winner
  for(const m of round.matches){
    if(!m.home||!m.away) continue;
    const p=draft[m.id];
    if(p&&p.home!=null&&p.away!=null&&+p.home===+p.away&&!p.penaltyWinner){
      toast(`${m.home} vs ${m.away}: pick who wins on penalties`); return;
    }
  }
  try{
    await setDoc(doc(db,'predictions',me.uid),
      {name:me.displayName||me.email,email:me.email,photoURL:me.photoURL||'',picks:draft},{merge:true});
    dirty=false; $('#savedNote').classList.remove('hide'); toast('Predictions saved');
  }catch(e){ toast('Save failed: '+(e.code||e.message)); }
};

function renderLeaderboard(){
  const list=$('#lbList'); list.innerHTML='';
  const rows=Object.entries(allPreds).map(([uid,d])=>{
    let total=0,exact=0,wins=0;
    if(tournament){
      tournament.rounds.forEach(r=>r.matches.forEach(m=>{
        if(!m.finished) return;
        const pick=d.picks?.[m.id];
        const pts=pointsFor(m,pick);
        total+=pts;
        if(pts>=10 && +pick?.home===m.homeScore && +pick?.away===m.awayScore) exact++;
        if(pts===20||pts===30) wins++;
      }));
    }
    return {uid,name:d.name||d.email||'Player',photo:d.photoURL,total,exact,wins};
  }).sort((a,b)=>b.total-a.total||b.exact-a.exact);

  if(rows.length===0){ list.innerHTML='<div class="empty">No players yet.</div>'; return; }
  rows.forEach((r,i)=>{
    const row=el('div','lbrow'+(i<3?' r'+(i+1):''));
    const av = r.photo? `<img class="av" src="${r.photo}">` : `<div class="av"></div>`;
    row.innerHTML=`<div class="rank">${i+1}</div>${av}
      <div><div class="nm">${r.name}${r.uid===me.uid?' \u00b7 you':''}</div>
      <div class="meta">${r.wins} winners \u00b7 ${r.exact} exact scores</div></div>
      <div class="tot">${r.total}<small>pts</small></div>`;
    list.appendChild(row);
  });
}

/* ===== ADMIN ===== */
function renderAdmin(){
  if(!isAdmin) return;
  const body=$('#adminBody'); body.innerHTML='';
  if(!tournament){ body.innerHTML='<div class="empty">Initialising tournament\u2026</div>'; return; }

  const intro=el('div'); intro.style.cssText='font-size:13px;color:var(--txt-dim);margin:4px 0 16px;line-height:1.5';
  intro.innerHTML='Type the team names, flip <b>Open</b> so people can predict, then <b>Lock</b> before kickoff. '+
    'Enter scores as matches finish and tick <b>Finished</b> \u2014 points update live. For a tie, pick the penalty winner.';
  body.appendChild(intro);

  tournament.rounds.forEach((r,ri)=>{
    const box=el('div','adminround');
    const head=el('div','adminhead');
    head.innerHTML=`<h3 style="flex:1">${r.name}</h3>`;
    const tOpen=el('button','toggle'+(r.open?' on':''));
    tOpen.textContent=r.open?'\u25cf Open':'Open';
    tOpen.onclick=()=>{ r.open=!r.open; saveTournament(); };
    const tLock=el('button','toggle lock'+(r.locked?' on':''));
    tLock.textContent=r.locked?'\u25cf Locked':'Lock';
    tLock.onclick=()=>{ r.locked=!r.locked; saveTournament(); };
    head.appendChild(tOpen); head.appendChild(tLock);
    box.appendChild(head);

    r.matches.forEach((m,mi)=>{
      const am=el('div','amatch');
      am.innerHTML=`
        <input type="text" placeholder="Home team" value="${m.home||''}" data-r="${ri}" data-m="${mi}" data-f="home">
        <input type="number" min="0" placeholder="" value="${m.homeScore??''}" data-r="${ri}" data-m="${mi}" data-f="homeScore">
        <input type="number" min="0" placeholder="" value="${m.awayScore??''}" data-r="${ri}" data-m="${mi}" data-f="awayScore">
        <input type="text" placeholder="Away team" value="${m.away||''}" data-r="${ri}" data-m="${mi}" data-f="away">`;
      box.appendChild(am);
      const foot=el('div','afoot');
      const isDraw = m.homeScore!=null&&m.awayScore!=null&&m.homeScore===m.awayScore;
      foot.innerHTML=`
        <label><input type="checkbox" data-r="${ri}" data-m="${mi}" data-f="finished" ${m.finished?'checked':''}> Finished</label>
        ${isDraw?`<label>Penalties: <select data-r="${ri}" data-m="${mi}" data-f="penaltyWinner">
          <option value="">\u2014</option>
          <option value="home" ${m.penaltyWinner==='home'?'selected':''}>${m.home||'Home'}</option>
          <option value="away" ${m.penaltyWinner==='away'?'selected':''}>${m.away||'Away'}</option>
        </select></label>`:''}
        ${m.finished&&m.home&&m.away?`<button type="button" style="background:transparent;border:1px solid var(--gold);color:var(--gold);padding:5px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer" onclick="openReviewPanel('${m.id}')">View picks</button>`:''}`;
      box.appendChild(foot);
    });

    const save=el('button','save-r'); save.textContent='Save '+r.name;
    save.onclick=()=>saveTournament(true);
    box.appendChild(save);
    body.appendChild(box);
  });

  // wire admin inputs into the local tournament object
  body.querySelectorAll('input,select').forEach(inp=>{
    const handler=()=>{
      const r=+inp.dataset.r, m=+inp.dataset.m, f=inp.dataset.f;
      let v;
      if(inp.type==='checkbox') v=inp.checked;
      else if(f==='homeScore'||f==='awayScore') v= inp.value===''?null:Math.max(0,parseInt(inp.value)||0);
      else v=inp.value;
      tournament.rounds[r].matches[m][f]=v;
    };
    inp.onchange=handler; if(inp.tagName==='INPUT'&&inp.type!=='checkbox') inp.oninput=handler;
  });
}

let saveTimer=null;
async function saveTournament(now){
  clearTimeout(saveTimer);
  const go=async()=>{
    try{ await setDoc(doc(db,'results','tournament'),tournament); toast('Tournament saved'); }
    catch(e){ toast('Save failed: '+(e.code||e.message)); }
  };
  if(now) go(); else saveTimer=setTimeout(go,400);
}

/* ===== REVIEW PANEL ===== */
window.openReviewPanel = function(matchId){
  const match=tournament.rounds.flatMap(r=>r.matches).find(m=>m.id===matchId);
  if(!match||!match.finished) return;
  
  $('#reviewTitle').textContent=`${match.home} vs ${match.away}`;
  
  const preds=$('#reviewPreds'); preds.innerHTML='';
  const rows=[];
  
  Object.entries(allPreds).forEach(([uid,d])=>{
    const pick=d.picks?.[matchId];
    const pts=pointsFor(match,pick);
    rows.push({uid,name:d.name||d.email||'Player',pick,pts});
  });
  
  rows.sort((a,b)=>b.pts-a.pts);
  
  rows.forEach(r=>{
    const row=el('div','rpred'+(r.pick?'':' nopick'));
    const pickTxt = r.pick&&r.pick.home!=null? 
      `${r.pick.home}–${r.pick.away}${r.pick.home===r.pick.away&&r.pick.penaltyWinner?` (${r.pick.penaltyWinner==='home'?match.home:match.away})`:''}` 
      : 'No prediction';
    row.innerHTML=`<div class="pname">${r.name}</div><div class="ppick">${pickTxt}</div><div class="ppts">${r.pts}</div>`;
    preds.appendChild(row);
  });
  
  $('#reviewPanel').classList.add('open');
}

$('#reviewClose').onclick=()=>$('#reviewPanel').classList.remove('open');
</script>
